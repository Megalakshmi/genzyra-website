<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | GenZyra</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <style>
        /* ── Reset ── */
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family:'Inter', sans-serif;
            background:#f0f4ff;
            color:#1f2937;
            min-height:100vh;
        }

        /* ── Auth guard ── */
        #auth-guard {
            position:fixed; inset:0; background:#f0f4ff;
            display:flex; align-items:center; justify-content:center; z-index:999;
            flex-direction:column; gap:1rem;
        }
        #auth-guard i { font-size:2.5rem; color:#4f46e5; }
        #auth-guard p { color:#6b7280; }

        /* ── Top bar ── */
        .topbar {
            background:#fff;
            border-bottom:1px solid #e5e7eb;
            padding:0 2rem;
            height:70px;
            display:flex; align-items:center; justify-content:space-between;
            position:sticky; top:0; z-index:100;
            box-shadow:0 2px 12px rgba(0,0,0,.05);
        }
        .topbar-left { display:flex; align-items:center; gap:1rem; }
        .topbar-logo {
            font-size:1.4rem; font-weight:800;
            background:linear-gradient(135deg,#4f46e5,#c026d3);
            -webkit-background-clip:text; background-clip:text;
            -webkit-text-fill-color:transparent;
        }
        .topbar-badge {
            background:#f0f0ff; color:#4f46e5;
            padding:.25rem .75rem; border-radius:100px;
            font-size:.75rem; font-weight:700; border:1px solid rgba(79,70,229,.2);
        }
        .topbar-right { display:flex; align-items:center; gap:1rem; }
        #admin-email  { font-size:.875rem; color:#6b7280; }
        .btn-logout {
            display:inline-flex; align-items:center; gap:.4rem;
            padding:.55rem 1.25rem; background:#fff; border:1.5px solid #e5e7eb;
            border-radius:100px; font-family:inherit; font-size:.875rem; font-weight:600;
            cursor:pointer; color:#1f2937; transition:all .25s;
        }
        .btn-logout:hover { border-color:#ef4444; color:#ef4444; }

        /* ── Layout ── */
        main { max-width:1300px; margin:0 auto; padding:2.5rem 2rem; }

        .page-header { margin-bottom:2rem; }
        .page-header h1 { font-size:1.75rem; font-weight:800; letter-spacing:-.5px; }
        .page-header p  { color:#6b7280; margin-top:.25rem; font-size:.95rem; }

        /* ── Stats row ── */
        .stats-row { display:grid; grid-template-columns:repeat(3,1fr); gap:1.5rem; margin-bottom:2rem; }
        .stat-box {
            background:#fff; border-radius:16px; padding:1.5rem 2rem;
            border:1px solid #e5e7eb; box-shadow:0 2px 8px rgba(0,0,0,.04);
            display:flex; align-items:center; gap:1.25rem;
        }
        .stat-icon {
            width:52px; height:52px; border-radius:14px;
            background:linear-gradient(135deg,rgba(79,70,229,.1),rgba(192,38,211,.1));
            display:flex; align-items:center; justify-content:center;
            font-size:1.6rem; color:#4f46e5; flex-shrink:0;
        }
        .stat-val { font-size:1.75rem; font-weight:800; color:#1f2937; line-height:1; }
        .stat-lab { font-size:.8rem; color:#6b7280; margin-top:.2rem; }

        /* ── Search + refresh bar ── */
        .toolbar {
            display:flex; align-items:center; gap:1rem; margin-bottom:1.5rem; flex-wrap:wrap;
        }
        .search-wrap {
            position:relative; flex:1; min-width:220px;
        }
        .search-wrap i {
            position:absolute; left:1rem; top:50%; transform:translateY(-50%);
            color:#9ca3af; font-size:1.1rem;
        }
        #searchInput {
            width:100%; padding:.8rem 1rem .8rem 2.75rem;
            border:1.5px solid #e5e7eb; border-radius:12px;
            font-family:inherit; font-size:.95rem; background:#fff;
            transition:border-color .25s, box-shadow .25s;
        }
        #searchInput:focus { outline:none; border-color:#4f46e5; box-shadow:0 0 0 3px rgba(79,70,229,.1); }

        .btn-refresh {
            display:inline-flex; align-items:center; gap:.4rem;
            padding:.8rem 1.25rem; background:#fff; border:1.5px solid #e5e7eb;
            border-radius:12px; font-family:inherit; font-size:.875rem; font-weight:600;
            cursor:pointer; color:#1f2937; transition:all .25s; white-space:nowrap;
        }
        .btn-refresh:hover { border-color:#4f46e5; color:#4f46e5; }
        .btn-refresh.spinning i { animation:spin 1s linear infinite; }
        @keyframes spin { to { transform:rotate(360deg); } }

        /* ── Table card ── */
        .table-card {
            background:#fff; border-radius:20px; border:1px solid #e5e7eb;
            overflow:hidden; box-shadow:0 4px 16px rgba(0,0,0,.05);
        }
        .table-card-header {
            padding:1.25rem 2rem; border-bottom:1px solid #f3f4f6;
            display:flex; align-items:center; justify-content:space-between;
        }
        .table-card-header h2 { font-size:1.05rem; font-weight:700; }
        .count-badge {
            background:#f0f0ff; color:#4f46e5; padding:.25rem .85rem;
            border-radius:100px; font-size:.78rem; font-weight:700;
        }
        .table-scroll { overflow-x:auto; max-height:600px; overflow-y:auto; }

        table { width:100%; border-collapse:collapse; }
        thead { background:#fafafa; position:sticky; top:0; z-index:1; }
        thead th {
            text-align:left; padding:1rem 1.5rem;
            font-size:.75rem; font-weight:700; text-transform:uppercase;
            letter-spacing:.8px; color:#9ca3af; border-bottom:1px solid #f3f4f6;
            white-space:nowrap;
        }
        tbody tr { transition:background .15s; }
        tbody tr:hover { background:#fbf9ff; }
        tbody td { padding:1.1rem 1.5rem; font-size:.925rem; border-bottom:1px solid #f9fafb; vertical-align:top; }
        tbody tr:last-child td { border-bottom:none; }

        .td-num  { color:#9ca3af; font-size:.8rem; font-weight:600; width:40px; }
        .td-name { font-weight:600; white-space:nowrap; }
        .td-email a { color:#4f46e5; text-decoration:none; }
        .td-email a:hover { text-decoration:underline; }
        .td-msg  { color:#4b5563; max-width:360px; word-break:break-word; line-height:1.55; }
        .td-time { color:#9ca3af; font-size:.8rem; white-space:nowrap; }
        .td-del  { width:48px; }

        .btn-del {
            width:34px; height:34px; border-radius:8px; border:1.5px solid #fee2e2;
            background:#fff; cursor:pointer; display:flex; align-items:center; justify-content:center;
            color:#ef4444; font-size:1.1rem; transition:all .2s;
        }
        .btn-del:hover { background:#fef2f2; border-color:#ef4444; }

        /* ── States ── */
        .state-row td { text-align:center; padding:5rem 2rem; color:#9ca3af; }
        .state-row i   { font-size:3rem; display:block; margin-bottom:1rem; }
        .state-row p   { font-size:1rem; }

        /* ── Live dot ── */
        .live-dot {
            display:inline-flex; align-items:center; gap:.4rem;
            font-size:.78rem; font-weight:600; color:#16a34a;
        }
        .live-dot::before {
            content:''; width:8px; height:8px; border-radius:50%;
            background:#22c55e; display:inline-block;
            animation:pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.4; } }

        /* ── Responsive ── */
        @media (max-width:768px) {
            .stats-row { grid-template-columns:1fr 1fr; }
            .topbar-badge, #admin-email { display:none; }
        }
        @media (max-width:480px) {
            .stats-row { grid-template-columns:1fr; }
            main { padding:1.5rem 1rem; }
        }
    </style>
</head>
<body>

    <!-- Auth loading guard -->
    <div id="auth-guard">
        <i class="bx bx-loader-alt bx-spin"></i>
        <p>Verifying access…</p>
    </div>

    <!-- Top bar -->
    <header class="topbar">
        <div class="topbar-left">
            <div class="topbar-logo">GenZyra.</div>
            <span class="topbar-badge">Admin Panel</span>
        </div>
        <div class="topbar-right">
            <span class="live-dot">Live</span>
            <span id="admin-email"></span>
            <button class="btn-logout" id="logoutBtn"><i class="bx bx-log-out"></i> Logout</button>
        </div>
    </header>

    <!-- Main -->
    <main>
        <div class="page-header">
            <h1>Contact Messages</h1>
            <p>All messages submitted through the website's contact form, updating in real-time.</p>
        </div>

        <!-- Stats -->
        <div class="stats-row">
            <div class="stat-box">
                <div class="stat-icon"><i class="bx bx-envelope"></i></div>
                <div><div class="stat-val" id="stat-total">—</div><div class="stat-lab">Total Messages</div></div>
            </div>
            <div class="stat-box">
                <div class="stat-icon"><i class="bx bx-calendar"></i></div>
                <div><div class="stat-val" id="stat-today">—</div><div class="stat-lab">Received Today</div></div>
            </div>
            <div class="stat-box">
                <div class="stat-icon"><i class="bx bx-search-alt"></i></div>
                <div><div class="stat-val" id="stat-filtered">—</div><div class="stat-lab">Showing</div></div>
            </div>
        </div>

        <!-- Toolbar -->
        <div class="toolbar">
            <div class="search-wrap">
                <i class="bx bx-search"></i>
                <input type="text" id="searchInput" placeholder="Search by name, email or message…">
            </div>
            <button class="btn-refresh" id="refreshBtn">
                <i class="bx bx-refresh"></i> Refresh
            </button>
        </div>

        <!-- Table -->
        <div class="table-card">
            <div class="table-card-header">
                <h2>All Submissions</h2>
                <span class="count-badge" id="countBadge">Loading…</span>
            </div>
            <div class="table-scroll">
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Message</th>
                            <th>Received</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="msg-body">
                        <tr class="state-row">
                            <td colspan="6">
                                <i class="bx bx-loader-alt bx-spin" style="color:#4f46e5;font-size:2rem;"></i>
                                <p>Loading messages…</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        const cfg = {
            apiKey:            "AIzaSyDo-4pAKhQJfijW9r53_pxyroEjygyxYeo",
            authDomain:        "genzyra-ef740.firebaseapp.com",
            projectId:         "genzyra-ef740",
            storageBucket:     "genzyra-ef740.firebasestorage.app",
            messagingSenderId: "412063629189",
            appId:             "1:412063629189:web:ec73b025f98167e8170eec"
        };

        firebase.initializeApp(cfg);
        const db   = firebase.firestore();
        const auth = firebase.auth();

        // ── All fetched messages (raw) ──────────────────
        let allMessages = [];
        let unsubscribe = null;

        // ── Auth guard ──────────────────────────────────
        auth.onAuthStateChanged(user => {
            document.getElementById('auth-guard').style.display = 'none';
            if (!user) { window.location.href = 'login.html'; return; }
            document.getElementById('admin-email').textContent = user.email;
            listenMessages(); // real-time listener
        });

        // ── Logout ──────────────────────────────────────
        document.getElementById('logoutBtn').addEventListener('click', () => {
            if (unsubscribe) unsubscribe();
            auth.signOut().then(() => window.location.href = 'login.html');
        });

        // ── Real-time listener ──────────────────────────
        function listenMessages() {
            unsubscribe = db.collection('messages')
                .orderBy('timestamp', 'desc')
                .onSnapshot(snapshot => {
                    allMessages = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    renderTable(applySearch(allMessages));
                }, err => {
                    console.error(err);
                    showError('Failed to load messages. Check Firestore rules.');
                });
        }

        // ── Manual refresh ──────────────────────────────
        document.getElementById('refreshBtn').addEventListener('click', function() {
            this.classList.add('spinning');
            setTimeout(() => this.classList.remove('spinning'), 800);
            renderTable(applySearch(allMessages));
        });

        // ── Search ──────────────────────────────────────
        document.getElementById('searchInput').addEventListener('input', function() {
            renderTable(applySearch(allMessages));
        });

        function applySearch(msgs) {
            const q = document.getElementById('searchInput').value.toLowerCase().trim();
            if (!q) return msgs;
            return msgs.filter(m =>
                (m.name    || '').toLowerCase().includes(q) ||
                (m.email   || '').toLowerCase().includes(q) ||
                (m.message || '').toLowerCase().includes(q)
            );
        }

        // ── Render ──────────────────────────────────────
        function renderTable(msgs) {
            const tbody = document.getElementById('msg-body');
            const today = new Date().toDateString();

            // Update stats
            const todayCount = allMessages.filter(m => {
                const ts = m.timestamp ? m.timestamp.toDate() : null;
                return ts && ts.toDateString() === today;
            }).length;

            document.getElementById('stat-total').textContent    = allMessages.length;
            document.getElementById('stat-today').textContent    = todayCount;
            document.getElementById('stat-filtered').textContent = msgs.length;
            document.getElementById('countBadge').textContent    = msgs.length + ' entries';

            if (msgs.length === 0) {
                tbody.innerHTML = emptyState();
                return;
            }

            tbody.innerHTML = msgs.map((m, i) => {
                const ts     = m.timestamp ? m.timestamp.toDate() : null;
                const dateStr = ts ? formatDate(ts) : 'N/A';
                return `
                    <tr>
                        <td class="td-num">${i + 1}</td>
                        <td class="td-name">${esc(m.name || '—')}</td>
                        <td class="td-email"><a href="mailto:${esc(m.email || '')}">${esc(m.email || '—')}</a></td>
                        <td class="td-msg">${esc(m.message || '—')}</td>
                        <td class="td-time">${dateStr}</td>
                        <td class="td-del">
                            <button class="btn-del" title="Delete" onclick="deleteMsg('${m.id}', this)">
                                <i class="bx bx-trash"></i>
                            </button>
                        </td>
                    </tr>`;
            }).join('');
        }

        // ── Delete ──────────────────────────────────────
        async function deleteMsg(docId, btn) {
            if (!confirm('Delete this message? This cannot be undone.')) return;
            btn.disabled = true;
            btn.innerHTML = '<i class="bx bx-loader-alt bx-spin"></i>';
            try {
                await db.collection('messages').doc(docId).delete();
                // onSnapshot will auto-refresh the table
            } catch (e) {
                alert('Failed to delete. Check Firestore rules allow deletes for authenticated users.');
                btn.disabled = false;
                btn.innerHTML = '<i class="bx bx-trash"></i>';
            }
        }

        // ── Helpers ─────────────────────────────────────
        function formatDate(d) {
            return d.toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' })
                + ' ' + d.toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' });
        }

        function esc(str) {
            return String(str)
                .replace(/&/g,'&amp;').replace(/</g,'&lt;')
                .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        function emptyState() {
            const q = document.getElementById('searchInput').value.trim();
            return q
                ? `<tr class="state-row"><td colspan="6"><i class="bx bx-search" style="color:#c4b5fd;"></i><p>No messages match "<strong>${esc(q)}</strong>".</p></td></tr>`
                : `<tr class="state-row"><td colspan="6"><i class="bx bx-inbox" style="color:#c4b5fd;"></i><p>No messages yet. They will appear here automatically.</p></td></tr>`;
        }

        function showError(msg) {
            document.getElementById('msg-body').innerHTML =
                `<tr class="state-row"><td colspan="6" style="color:#ef4444;"><i class="bx bx-error-circle"></i><p>${msg}</p></td></tr>`;
        }
    </script>
</body>
</html>
